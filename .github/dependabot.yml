version: 2
registries:
  npm-registry:
    type: npm-registry
    url: https://registry.npmjs.org
    token: ${{secrets.READER_TOKEN}}

updates:
  - package-ecosystem: npm
    directory: /
    registries:
      - npm-registry
    schedule:
      interval: daily
      time: '06:00'
      timezone: Europe/Oslo
    open-pull-requests-limit: 30
    groups:
      navikt-dependencies:
        patterns:
          - '@navikt/*'
      react-dependencies:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      minor-and-patch-dependencies:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
      major-dependencies:
        patterns:
          - '*'
        update-types:
          - major

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: sunday
      timezone: Europe/Oslo

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: '06:00'
      timezone: Europe/Oslo
    open-pull-requests-limit: 10
